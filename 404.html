<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite nicht gefunden – NF Immoservice GmbH</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <style>
        .nf404 { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
        .nf404 h1 { font-size: clamp(3rem, 10vw, 6rem); }
        .nf404 .accent { color: var(--orange); }
        .nf404 p { color: var(--muted); margin: 12px 0 28px; }
    </style>
</head>
<body>
    <main class="nf404">
        <div>
            <svg width="120" height="76" viewBox="0 0 100 62" aria-hidden="true">
                <polygon points="0,50 55,10 55,24 10,58" fill="#23272E"/>
                <polygon points="55,10 100,42 100,56 55,24" fill="#E8722C"/>
            </svg>
            <h1>4<span class="accent">0</span>4</h1>
            <p>Diese Seite wurde nicht gefunden – aber wir helfen Ihnen gerne weiter.</p>
            <a href="/" class="btn btn-primary" id="homeLink">Zur Startseite</a>
            <script>
                // Auf GitHub Pages (Projektseite) liegt die Startseite unter /<repo>/
                if (location.hostname.endsWith('github.io')) {
                    document.getElementById('homeLink').href = '/' + location.pathname.split('/')[1] + '/';
                }
            </script>
        </div>
    </main>
</body>
</html>
